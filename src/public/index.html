<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Assistant</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-container">
      <!-- Header -->
      <div class="chat-header">
        <div class="d-flex align-items-center gap-2">
          <div class="header-icon">
            <i class="bi bi-robot"></i>
          </div>
          <div>
            <h5 class="mb-0">Company Assistant</h5>
            <small class="text-light opacity-75">Ask me anything about our company</small>
          </div>
        </div>
      </div>

      <!-- Messages Area -->
      <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">
          <div class="message-avatar">
            <i class="bi bi-robot"></i>
          </div>
          <div class="message-bubble">
            Hello! I'm your company assistant. Ask me anything about our company and I'll do my best to help you.
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="chat-input">
        <form id="chatForm" class="d-flex gap-2">
          <input
            type="text"
            id="messageInput"
            class="form-control"
            placeholder="Type your question here..."
            autocomplete="off"
          />
          <button type="submit" class="btn btn-send" id="sendBtn">
            <i class="bi bi-send-fill"></i>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/chat.js"></script>
</body>
</html>
